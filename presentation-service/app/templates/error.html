<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #fff1f2, #fef2f2);
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-card {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
            padding: 36px;
            text-align: center;
            border-top: 6px solid #ef4444;
        }

        .error-card h1 {
            margin-top: 0;
            margin-bottom: 16px;
            color: #dc2626;
            font-size: 2rem;
        }

        .error-card p {
            margin-bottom: 24px;
            color: #4b5563;
            line-height: 1.6;
            font-size: 16px;
        }

        .back-link {
            display: inline-block;
            text-decoration: none;
            background: #ef4444;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .back-link:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <h1>Error</h1>
        <p>{{ message }}</p>
        <a class="back-link" href="/">Back</a>
    </div>
</body>
</html>
